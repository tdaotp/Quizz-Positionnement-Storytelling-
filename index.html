<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ton storytelling peut-il te propulser ? Découvre-le avec ce quiz stratégique</title>
    <link rel="stylesheet" href="https://tdaotp/quiz-storytelling/style.css"> Lien vers le fichier CSS
</head>
<body>

    <div id="quiz-container">
        <h1>Ton storytelling peut-il te propulser ? Découvre-le avec ce quiz stratégique</h1>

        <!-- Formulaire de collecte des informations -->
        <div id="info-form">
            <label for="first-name">Prénom :</label>
            <input type="text" id="first-name" name="first-name" required><br>

            <label for="last-name">Nom :</label>
            <input type="text" id="last-name" name="last-name" required><br>

            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required><br>

            <button id="start-button" onclick="startQuiz()">Commencer le quiz</button>
        </div>

        <div id="question-container" style="display: none;">
            <!-- Les questions et réponses seront insérées ici par JavaScript -->
        </div>
        <button id="next-button" onclick="nextQuestion()" style="display: none;">Suivant</button>
    </div>

    <div id="result-container" style="display: none;">
        <h2>Résultat du Quiz</h2>
        <p id="score-text"></p>
        <p id="level-text"></p>
        <button onclick="restartQuiz()">Recommencer le Quiz</button>
    </div>

    <!-- Lien vers le fichier JavaScript -->
    <script src="https://tdaotp/quiz-storytelling/script.js"></script> <!-- Lien vers ton fichier script.js -->
</body>
</html>
